<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&family=Pinyon+Script&display=swap"   rel="stylesheet">
</head>

<body>

  <header>
    <div class="nav">
      <div class="brand">
        <img src="images/Logo.jpg" alt="Nails x Mocha Logo">
      </div>

      <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#services">Services</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="policy.html">Policy</a>
        <a href="https://nailssxmocha-booking.as.me/" class="book-btn">Book</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="gallery">
      <h2 class="gallery-title">Nail Gallery</h2>

      <div class="gallery">
        <img src="images/nail1.jpeg" alt="Nail design 1" onclick="openImage(this)">
        <img src="images/nail2.jpeg" alt="Nail design 2"  onclick="openImage(this)">
        <img src="images/nail3.jpeg" alt="Nail design 3"  onclick="openImage(this)">
        <img src="images/nail4.jpeg" alt="Nail design 4" onclick="openImage(this)">
        <img src="images/nail5.jpeg" alt="Nail design 5" onclick="openImage(this)">
        <img src="images/nail6.jpeg" alt="Nail design 6"  onclick="openImage(this)">
        <img src="images/nail7.jpeg" alt="Nail design 7"  onclick="openImage(this)">
        <img src="images/nail8.jpeg" alt="Nail design 8" onclick="openImage(this)">
      </div>

      <div id="lightbox">
         <button class="prev" onclick="showPrev(event)">❮</button>
         <div class="lightbox-track" id="lightbox-track"></div>
         <button class="next" onclick="showNext(event)">❯</button>
         <div class="dots" id="dots"></div>
</div>
    </section>
  </main>

 <script>
const images = document.querySelectorAll(".gallery img");
let currentIndex = 0;

let startX = 0;
let startY = 0;
let endX = 0;
let endY = 0;

let scale = 1;
let startDistance = 0;

let isSwiping = false;

const track = document.getElementById("lightbox-track");
const dotsContainer = document.getElementById("dots");

function openImage(img) {
  const lightbox = document.getElementById("lightbox");

  currentIndex = Array.from(images).indexOf(img);

  track.innerHTML = "";
  dotsContainer.innerHTML = "";

  images.forEach((image, i) => {
    const clone = image.cloneNode();
    track.appendChild(clone);

    const dot = document.createElement("span");
    if (i === currentIndex) dot.classList.add("active");
    dotsContainer.appendChild(dot);
  });

  updateSlide();

  lightbox.style.display = "flex";
  setTimeout(() => lightbox.classList.add("active"), 10);
}

function updateSlide() {
  track.style.transform = `translateX(-${currentIndex * 100}%)`;

  const dots = document.querySelectorAll(".dots span");
  dots.forEach((d, i) => {
    d.classList.toggle("active", i === currentIndex);
  });
}


function showNext(e) {
  if (e) e.stopPropagation();
  currentIndex = (currentIndex + 1) % images.length;
  updateSlide();
}

function showPrev(e) {
  if (e) e.stopPropagation();
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  updateSlide();
}
function closeImage() {
  const lightbox = document.getElementById("lightbox");
  lightbox.classList.remove("active");

  setTimeout(() => {
    lightbox.style.display = "none";
  }, 300);
}


document.getElementById("lightbox").addEventListener("click", function(e) {
  if (isSwiping) return;
  if (e.target.tagName === "IMG") {
    return;
  }

  // otherwise close
  closeImage();
});

const lightbox = document.getElementById("lightbox");


lightbox.addEventListener("touchstart", (e) => {
  isSwiping = false;

  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;

  if (e.touches.length === 2) {
    startDistance = getDistance(e.touches);
  }
});


let currentTranslate = 0;
let prevTranslate = 0;

lightbox.addEventListener("touchmove", (e) => {
  const moveX = e.touches[0].clientX;
  const diff = moveX - startX;

  currentTranslate = prevTranslate + diff;
  track.style.transition = "none";
  track.style.transform = `translateX(${currentTranslate}px)`;
});

lightbox.addEventListener("touchend", () => {
  const movedBy = currentTranslate - prevTranslate;

  if (movedBy < -50) currentIndex++;
  if (movedBy > 50) currentIndex--;

  currentIndex = Math.max(0, Math.min(currentIndex, images.length - 1));

  prevTranslate = -currentIndex * window.innerWidth;

  track.style.transition = "transform 0.4s ease";
  updateSlide();
});


function getDistance(touches) {
  return Math.hypot(
    touches[0].clientX - touches[1].clientX,
    touches[0].clientY - touches[1].clientY
  );
}


document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") showNext();
  if (e.key === "ArrowLeft") showPrev();
  if (e.key === "Escape") closeImage();
});
</script>

</body>
