<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | NailssxMocha</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&family=Pinyon+Script&display=swap"   rel="stylesheet">
</head>

<body>

  <header>
    <div class="nav">
      <div class="brand">
        <img src="images/Logo.jpg" alt="Nails x Mocha Logo">
      </div>

      <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#services">Services</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="policy.html">Policy</a>
        <a href="https://nailssxmocha-booking.as.me/" class="book-btn">Book</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="gallery">
      <h2 class="gallery-title">Nail Gallery</h2>

      <div class="gallery">
        <img src="images/nail1.jpeg" alt="Nail design 1" onclick="openImage(this)">
        <img src="images/nail2.jpeg" alt="Nail design 2"  onclick="openImage(this)">
        <img src="images/nail3.jpeg" alt="Nail design 3"  onclick="openImage(this)">
        <img src="images/nail4.jpeg" alt="Nail design 4" onclick="openImage(this)">
        <img src="images/nail5.jpeg" alt="Nail design 5" onclick="openImage(this)">
        <img src="images/nail6.jpeg" alt="Nail design 6"  onclick="openImage(this)">
        <img src="images/nail7.jpeg" alt="Nail design 7"  onclick="openImage(this)">
        <img src="images/nail8.jpeg" alt="Nail design 8" onclick="openImage(this)">
      </div>

      <div id="lightbox">
  	<button class="prev" onclick="showPrev(event)">❮</button>
	<img id="lightbox-img">
	<button class="next" onclick="showNext(event)">❯</button>
	</div>
    </section>
  </main>

 <script>
const images = document.querySelectorAll(".gallery img");
let currentIndex = 0;

let startX = 0;
let startY = 0;
let endX = 0;
let endY = 0;

let scale = 1;
let startDistance = 0;

let isSwiping = false;


function openImage(img) {
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  currentIndex = Array.from(images).indexOf(img);
  lightboxImg.src = images[currentIndex].src;
  lightbox.style.display = "flex";

  setTimeout(() => {
    lightbox.classList.add("active");
    lightboxImg.classList.add("slide-in");
  }, 10);

  resetZoom();
}


function changeImage(direction) {
  const img = document.getElementById("lightbox-img");
  img.classList.remove("slide-in");

  if (direction === "next") {
    img.classList.add("slide-out-left");
  } else {
    img.classList.add("slide-out-right");
  }

  setTimeout(() => {
    if (direction === "next") {
      currentIndex = (currentIndex + 1) % images.length;
    } else {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
    }

    img.src = images[currentIndex].src;

    img.classList.remove("slide-out-left", "slide-out-right");
    img.classList.add("slide-in");

    resetZoom();
  }, 200);
}

function showNext(e) {
  if (e) e.stopPropagation();
  changeImage("next");
}

function showPrev(e) {
  if (e) e.stopPropagation();
  changeImage("prev");
}

function closeImage() {
  const lightbox = document.getElementById("lightbox");
  lightbox.classList.remove("active");

  setTimeout(() => {
    lightbox.style.display = "none";
  }, 300);
}


document.getElementById("lightbox").addEventListener("click", function(e) {
  if (isSwiping) return;

  const screenWidth = window.innerWidth;

  if (e.target.id === "lightbox-img") {
    if (e.clientX > screenWidth / 2) {
      showNext();
    } else {
      showPrev();
    }
  } else {
    closeImage();
  }
});

const lightbox = document.getElementById("lightbox");


lightbox.addEventListener("touchstart", (e) => {
  isSwiping = false;

  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;

  if (e.touches.length === 2) {
    startDistance = getDistance(e.touches);
  }
});


lightbox.addEventListener("touchmove", (e) => {

  const moveX = e.touches[0].clientX;
  const moveY = e.touches[0].clientY;

  if (Math.abs(moveX - startX) > 10 || Math.abs(moveY - startY) > 10) {
    isSwiping = true;
  }

  if (e.touches.length === 1) {
    e.preventDefault();
  }

  if (e.touches.length === 2) {
    const newDistance = getDistance(e.touches);
    scale = newDistance / startDistance;

    scale = Math.min(Math.max(scale, 1), 3);
    document.getElementById("lightbox-img").style.transform = `scale(${scale})`;
  }
}, { passive: false });


lightbox.addEventListener("touchend", (e) => {
  endX = e.changedTouches[0].clientX;
  endY = e.changedTouches[0].clientY;

  const diffX = startX - endX;
  const diffY = startY - endY;

if (scale > 1) {
    resetZoom();
    return; // stop here so it doesn't trigger swipe
  }

  if (Math.abs(diffX) > 50 && Math.abs(diffY) < 50) {
    if (diffX > 0) {
      showNext();
    } else {
      showPrev();
    }
  }
});


function getDistance(touches) {
  return Math.hypot(
    touches[0].clientX - touches[1].clientX,
    touches[0].clientY - touches[1].clientY
  );
}

function resetZoom() {
  scale = 1;
  const img = document.getElementById("lightbox-img");
  img.style.transform = "scale(1)";
}

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") showNext();
  if (e.key === "ArrowLeft") showPrev();
  if (e.key === "Escape") closeImage();
});
</script>

  <footer>
    <p>Follow us on Instagram</p>
    <a href="https://www.instagram.com/nailssxmocha/" target="_blank" class="social-btn">
    <div class="social-icon">
      <img src="images/instagram.png">
    </div>
    </a>
  </footer>

</body>
</html>
