<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment - NailssxMocha</title>

<style>

body{
  font-family: Arial, sans-serif;
  background-color:#f7e6ea;
  color:#5a3a3a;
  margin:0;
  line-height:1.6;
}

/* Header nav */
header{

  background-color:#f2d7dc;
  padding:15px 40px;
  display:flex;
  align-items:center;

}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1100px;
  margin:auto;
  width:100%;
}

.brand img{
  max-height:100px;  /* adjust logo size */
  display:block;
}

nav a{
  text-decoration:none;
  color:#5a3a3a;
  margin-left:25px;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

nav a:hover{
  opacity:0.7;
}

nav .book-btn{
  background-color:#8b5e5e;
  color:white;
  padding:6px 16px;
  border-radius:20px;
  margin-left:25px;
}

/* Container for content */
.container{
  max-width:1100px;
  margin:auto;
  padding:40px;
  text-align:center;
}

/* Button styling (optional) */
button{
  background-color:#8b5e5e;
  color:white;
  border:none;
  padding:14px 28px;
  font-size:16px;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background-color:#a97474;
  transform:scale(1.05);
}

footer{
  background-color:#8b5e5e;
  color:white;
  padding:20px;
  text-align:center;
  margin-top:40px;
}
@media (max-width:768px){

.nav{
  flex-direction:column;
}

nav{
  margin-top:10px;
}

nav a{
  margin:10px;
  display:inline-block;
}

.gallery img{
  width:90%;
}

.hero h1{
  font-size:32px;
}

}

</style>

</head>

<body>

<header>
  <div class="nav">
    <div class="brand">
      <img src="Logo.jpg" alt="Nails x Mocha Logo">
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#services">Services</a>
      <a href="index.html#gallery">Gallery</a>
      <a href="booking.html" class="book-btn">Book</a>
    </nav>
  </div>
</header>

<div class="container">

<h2>Book Your Appointment</h2>
<p>Click below to schedule your nail service:</p>

<!-- Calendly inline widget -->
<div class="calendly-inline-widget" data-url="https://calendly.com/alisonymaryory95/appointment?background_color=f7e6ea&text_color=d89ca6&primary_color=5a3a3a" style="min-width:320px;height:700px;"></div>
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

<!-- Optional Acuity iframe -->
<iframe src="https://app.acuityscheduling.com/schedule.php?owner=38782823&ref=embedded_csp" title="Schedule Appointment" width="100%" height="800" frameBorder="0" allow="payment"></iframe>
<script src="https://embed.acuityscheduling.com/js/embed.js" type="text/javascript"></script>


</div>

<footer>

<p>Follow us on Instagram</p>

<a href="https://www.instagram.com/nailssxmocha/" target="_blank">
<button>Instagram</button>
</a>

</footer>
</body>
</html>
